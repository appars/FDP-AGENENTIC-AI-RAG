name: AI Deploy (Full System)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.ai.outputs.decision }}
      deployment-id: ${{ steps.deploy.outputs.deployment-id }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install -r requirements.txt

      - name: Build
        run: |
          npm install
          npm run build 2>&1 | tee build.log

      - name: Test
        run: npm test -- --coverage --watchAll=false 2>&1 | tee test.log
        continue-on-error: true

      - name: Security Scan
        run: |
          npm audit || echo "Security scan completed"

      - name: AI Agent Decision
        id: ai
        run: |
          python3 cicd_agent.py \
            --branch "${{ github.ref_name }}" \
            --commit "$(git rev-parse --short HEAD)" \
            --message "$(git log -1 --pretty=%B)" \
            --build-log "$(cat build.log)" \
            --test-log "$(cat test.log)" \
            --build-number ${{ github.run_number }} > decision.json
          
          DECISION=$(jq -r '.decision' decision.json)
          echo "decision=$DECISION" >> $GITHUB_OUTPUT
          cat decision.json

  deploy:
    needs: build-and-analyze
    runs-on: ubuntu-latest
    if: needs.build-and-analyze.outputs.decision == 'DEPLOY'
    outputs:
      deployment-id: ${{ steps.deploy-step.outputs.deployment-id }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        id: deploy-step
        run: |
          DEPLOYMENT_ID="deploy-$(date +%s)"
          echo "deployment-id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          
          # Example: Push image and deploy
          # docker build -t myapp:${{ github.sha }} .
          # docker push myapp:${{ github.sha }}
          # kubectl set image deployment/app app=myapp:${{ github.sha }} -n prod
          
          echo "✓ Deployment: $DEPLOYMENT_ID"

  monitor-health:
    needs: [build-and-analyze, deploy]
    runs-on: ubuntu-latest
    if: needs.build-and-analyze.outputs.decision == 'DEPLOY'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Wait for deployment
        run: sleep 5

      - name: Health Check
        run: |
          # Check if app is healthy
          # curl -f https://myapp.example.com/health || exit 1
          echo "✓ Health checks passed"

      - name: Notify Success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {"text": "✅ ${{ github.repository }} deployed successfully"}

  rollback-on-failure:
    needs: monitor-health
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Automatic Rollback
        run: |
          echo "🔄 Rolling back deployment..."
          # kubectl rollout undo deployment/app -n prod
          
      - name: Alert
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {"text": "🚨 ROLLBACK: Deployment issues detected"}
