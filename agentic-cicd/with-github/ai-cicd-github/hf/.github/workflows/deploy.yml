name: AI Deploy (HuggingFace)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  build-test-decide:
    runs-on: ubuntu-latest
    outputs:
      decision: ${{ steps.ai.outputs.decision }}
      confidence: ${{ steps.ai.outputs.confidence }}
      reasoning: ${{ steps.ai.outputs.reasoning }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT

      - name: Install deps
        run: pip install -r requirements-hf.txt

      - name: Build & Test
        run: |
          npm install && npm run build 2>&1 | tee build.log
          npm test -- --watchAll=false 2>&1 | tee test.log
        continue-on-error: true

      - name: AI Decision
        id: ai
        run: |
          python3 hf_agent.py \
            --branch "${{ github.ref_name }}" \
            --commit "${{ steps.commit.outputs.sha }}" \
            --message "${{ steps.commit.outputs.message }}" \
            --build-log "$(cat build.log)" \
            --test-log "$(cat test.log)" \
            --build-number ${{ github.run_number }} > decision.json
          
          echo "decision=$(jq -r '.decision' decision.json)" >> $GITHUB_OUTPUT
          echo "confidence=$(jq -r '.confidence' decision.json)" >> $GITHUB_OUTPUT
          echo "reasoning=$(jq -r '.reasoning' decision.json)" >> $GITHUB_OUTPUT

      - uses: slackapi/slack-github-action@v1.24.0
        if: steps.ai.outputs.decision != 'DEPLOY'
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {"text": "Build #${{ github.run_number }}: ${{ steps.ai.outputs.decision }}",
             "attachments": [{"color": "warning",
             "fields": [{"title": "Reason", "value": "${{ steps.ai.outputs.reasoning }}"}]}]}

  deploy:
    needs: build-test-decide
    runs-on: ubuntu-latest
    if: needs.build-test-decide.outputs.decision == 'DEPLOY'

    steps:
      - uses: actions/checkout@v4
      - run: echo "✓ Deploying to production"
      - uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {"text": "✅ Deployed (${{ needs.build-test-decide.outputs.confidence }})"}
